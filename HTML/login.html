<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveFit - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        body { 
            background-color: #0d0d0d; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        .card { 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            box-shadow: 0 0 20px rgba(0,0,0,0.7); 
        }

      
        .brand-text {
            color: #ffffff;
        }
        .brand-highlight {
            color: #ccff00; 
        }

     
        .form-control { 
            background-color: #000000; 
            border: 1px solid #444; 
            color: #ffffff !important; 
            padding: 12px;
        }

       
        .form-control::placeholder {
            color: #666; 
        }

        .form-control:focus { 
            background-color: #000000; 
            color: white; 
            border-color: #ccff00; 
            box-shadow: 0 0 8px rgba(204, 255, 0, 0.3); 
        }

        .form-label {
            color: #cccccc;
            font-weight: 500;
        }

        .btn-neon { 
            background-color: #ccff00; 
            color: black; 
            font-weight: 900; 
            width: 100%; 
            padding: 12px;
            border: none; 
            text-transform: uppercase;
        }
        .btn-neon:hover { 
            background-color: #b3e600; 
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.5);
        }

        a { text-decoration: none; transition: 0.3s; }
        .link-create { color: white; font-weight: bold; }
        .link-create:hover { color: #ccff00; }
        .link-back { color: #888; font-size: 0.9rem; }
        .link-back:hover { color: #ccff00; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4"> <div class="card p-4 rounded-4">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold brand-text">MOVE<span class="brand-highlight">FIT</span>.</h2>
                        <p style="color: #888;">Acesse sua conta</p>
                    </div>

                    <form action="../PHP/processa_login.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                        </div>
                        <div class="mb-4"> <label class="form-label">Senha</label>
                            <input type="password" name="senha" class="form-control" placeholder="********" required>
                        </div>

                        <button type="submit" class="btn btn-neon mb-3">ENTRAR</button>
                    </form>

              <div class="text-center">
    <span style="color: #888;">Não tem conta?</span> 
    <a href="cadastro.html" class="link-create">Crie agora</a>
    <br><br>
    <a href=" ../PHP.front/home.php" class="link-back">Voltar ao site</a>
</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
